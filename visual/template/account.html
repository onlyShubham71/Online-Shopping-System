<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="../css/account.css">

</head>
<body>
    <nav class="nav-w">
        nav bar
    </nav>
    <section class="profile-description">
        <div class="container">
            <div class="row">
                <div class="col-4">
                    <div class="profile-left">   
                        <div class="profile-pic">
                            <label class="-label" for="file">
                                <span><i class="fa-regular fa-camera"></i>Change Image</span>
                            </label>
                            <input id="file" type="file" onchange="loadFile(event)"/>
                            <img src="../assets/user-img.png" id="output" width="200" />
                        </div>
                        <div class="profile-username">
                            <h3>Soumalyo Ghosh</h3>
                            <p>Enthusiast Buyer</p>
                        </div>
                        <div class="profile-activity">
                            <h4>Activity</h4>
                            <ul>
                                <li><a href="#"><p>Orders</p><p>5</p></a></li>
                                <li><a href="#"><p>Cartlist</p><p>3</p></a></li>
                                <li><a href="#"><p>Reviews</p><p>6</p></a></li>
                                <li><a href="#"><p>Favourites</p><p>2</p></a></li>
                                
                            </ul>
                        </div>
                    </div>
                </div>
                <div class="col-8">
                    <div class="profile-right">
                        <nav>
                            <ul class="nav nav-tabs" id="myTab" role="tablist">
                                <li class="nav-item" role="presentation">
                                    <button class="nav-link active" id="about-tab" data-bs-toggle="tab" data-bs-target="#about" type="button" role="tab" aria-controls="about" aria-selected="true">About</button>
                                </li>
                                <li class="nav-item" role="presentation">
                                    <button class="nav-link" id="order-tab" data-bs-toggle="tab" data-bs-target="#order" type="button" role="tab" aria-controls="order" aria-selected="false">My order</button>
                                </li>
                                <li class="nav-item" role="presentation">
                                    <button class="nav-link" id="security-tab" data-bs-toggle="tab" data-bs-target="#security" type="button" role="tab" aria-controls="security" aria-selected="false">Account security</button>
                                </li>
                                
                            </ul>
                        </nav>   

                        <div class="tab-content">
                            <div class="tab-pane active" id="about" role="tabpanel" aria-labelledby="about-tab">
                                <form>
                                  <div class="mb-3">
                                      <label for="name" class="form-label">Full Name</label>
                                      <input type="text" class="form-control" id="name" placeholder="User Name">
                                  </div>
                                  <div class="mb-3">
                                      <label for="bio" class="form-label">Bio</label>
                                      <input type="text" class="form-control" id="bio" placeholder="Tell us about yourself">
                                  </div>
                                  <div class="mb-3">
                                      <label for="occupation" class="form-label">Occupation (Optional)</label>
                                      <select id="occupation" class="form-select">
                                          <option>Teacher</option>
                                          <option>Student</option>
                                      </select>
                                  </div>
                                  <div class="mb-3">
                                      <label for="country" class="form-label">State</label>
                                      <select id="country" class="form-select">
                                          <option>West Bengal</option>
                                          <option>Assam</option>
                                          <option>Odisha</option>
                                          <option>Tamil Nadu</option>
                                          <option>Maharashtra</option>
                                      </select>
                                  </div>
                                  <div class="mb-3">
                                      <label for="city" class="form-label">Address </label>
                                      <input type="text" class="form-control"  placeholder="City, Street, etc.">
                                  </div>
                                  <button type="submit" class="c-btn-sub mt-2">Submit</button>
                              </form>
                            </div>
                            <div class="tab-pane" id="order" role="tabpanel" aria-labelledby="order-tab">
                            </div>

                            <div class="tab-pane" id="security" role="tabpanel" aria-labelledby="security-tab">
                                <form>
                                  <div class="mb-3">
                                      <label for="email" class="mb-2">Email</label>
                                      <input type="text" class="form-control" id="email" placeholder="email@domain.com" >
                                  </div>
                                  <div class="mb-3">
                                      <button type="button" class="c-btn-sub mt-2">Edit</button>
                                  </div>
                                  <div class="mb-3 c-security">
                                      <label for="password" class="mb-2">Password</label>
                                      <input type="text" class="form-control" id="password" placeholder="********" >
                                      <div class="c-passIcon">
                                          <i class="fa fa-eye-slash"></i>
                                      </div>
                                  </div>
                                  <div class="mb-3">
                                      <button type="button" class="c-btn-sub mt-2">Change Password</button>
                                  </div>
                                  <div class="mb-3">
                                      <label for="number" class="mb-2">Phone Number</label>
                                      <input type="text" class="form-control" id="number" placeholder="+91 1234567890" >
                                  </div>
                                  <div class="mb-3">
                                      <button type="button" class="c-btn-sub mt-2">Edit</button>
                                  </div>
                              </form>
                            </div>
                            
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>
    <footer class="footer-w">
            footer
    </footer>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
    <script>
        var loadFile = function (event) {
  var image = document.getElementById("output");
  image.src = URL.createObjectURL(event.target.files[0]);
};

    </script>
</body>
</html>
