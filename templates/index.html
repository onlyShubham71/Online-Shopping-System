<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuickShop | Online Shopping System</title>
    <link rel="stylesheet" href="../static/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <header>
        <nav class="navbar">
            <div class="logo">Quick<span>Shop</span></div>
            <ul class="nav-links">
                <li><a href="/">Home</a></li>
                <li><a href="/products">Shop</a></li>
                <li><a href="/login">Login/Register</a></li>
                <li><a href="/cart" class="cart-icon">
                    <i class="fas fa-shopping-cart"></i>
                    <span id="cart-count">0</span>
                </a></li>
            </ul>
        </nav>
    </header>

    <section class="hero">
        <div class="hero-content">
            <h1>Upgrade Your Lifestyle</h1>
            <p>Best deals on Electronics, Fashion, and more.</p>
            <a href="#products" class="btn">Shop Now</a>
        </div>
    </section>

    <main id="products" class="container">
        <h2 class="section-title">Featured Products</h2>
        
        <div class="product-grid">
            <div class="product-card">
                <div class="product-image">
                    <img src="../static/images/sample-product.jpg" alt="Product Name">
                </div>
                <div class="product-info">
                    <h3>Smartphone Pro Max</h3>
                    <p class="category">Electronics</p>
                    <p class="price">$999.00</p>
                    <button class="add-to-cart-btn" onclick="addToCart(1)">Add to Cart</button>
                </div>
            </div>

            </div>
    </main>

    <footer>
        <p>&copy; 2024 QuickShop E-commerce System | PBSSD Project</p>
    </footer>

    <script src="../static/js/script.js"></script>
</body>
</html>
